<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wateen OS - Smart Mouse</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(25, 25, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-color: #0A84FF; /* لون آبل الأزرق */
            --text-main: #ffffff;
            --text-muted: #8e8e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 70%);
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .screen.active {
            display: flex;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 15px 20px;
            border-radius: 16px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover, .btn:active {
            background: rgba(40, 40, 40, 0.8);
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--primary-color);
            border: none;
            font-weight: 600;
        }

        .btn-primary:hover, .btn-primary:active {
            background: #0071e3;
        }

        .code-display {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 10px;
            margin: 20px 0;
            color: var(--primary-color);
            text-shadow: 0 0 20px rgba(10, 132, 255, 0.4);
        }

        .pin-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 15px;
            border-radius: 16px;
            font-size: 24px;
            text-align: center;
            letter-spacing: 10px;
            margin-bottom: 20px;
            outline: none;
            transition: border 0.3s;
        }

        .pin-input:focus {
            border-color: var(--primary-color);
        }

        /* Trackpad Area (Sender) */
        #trackpad-area {
            width: 100%;
            height: 70vh;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            margin-top: 20px;
            position: relative;
            touch-action: none; /* منع التمرير الافتراضي للصفحة */
        }
        
        .trackpad-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-muted);
            opacity: 0.5;
            pointer-events: none;
        }

        /* Custom Cursor (Receiver) */
        #custom-cursor {
            display: none;
            position: absolute;
            width: 20px;
            height: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 512"><path fill="%23ffffff" d="M302.189 329.126H196.105l55.831 135.993c3.889 9.428-.555 19.999-9.444 23.999l-49.165 21.427c-9.165 4-19.443-.571-23.332-9.714l-53.053-129.136-86.664 89.138C22.279 469.715 0 463.153 0 452.873V55.856C0 42.427 15.556 34.714 26.11 43.856l284.444 257.986c10.833 9.714 3.889 27.284-8.365 27.284z"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 9999;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5));
            transition: top 0.05s linear, left 0.05s linear; /* حركة سلسة */
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 10px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <div id="screen-home" class="screen active">
        <div class="glass-panel">
            <h1>Wateen OS</h1>
            <p>اختر دور هذا الجهاز في عملية الاتصال</p>
            
            <button class="btn" onclick="initReceiver()">
                <i class="fa-solid fa-tablet-screen-button"></i>
                مستلم (الآيباد - عرض الماوس)
            </button>
            <button class="btn btn-primary" onclick="showSenderLogin()">
                <i class="fa-solid fa-mobile-screen"></i>
                مرسل (الهاتف - تحريك الماوس)
            </button>
        </div>
    </div>

    <div id="screen-receiver" class="screen">
        <div class="glass-panel" id="receiver-waiting">
            <h1>رمز الاتصال</h1>
            <p>أدخل هذا الرمز في هاتفك لربط الجهازين</p>
            <div class="code-display" id="display-code">----</div>
            <div class="loader" id="receiver-loader" style="display: block;"></div>
            <p id="receiver-status">جاري إنشاء الرمز...</p>
        </div>
    </div>

    <div id="screen-sender-login" class="screen">
        <div class="glass-panel">
            <h1>ربط الجهاز</h1>
            <p>أدخل رمز الاتصال الظاهر على شاشة الآيباد</p>
            <input type="tel" id="input-code" class="pin-input" maxlength="4" placeholder="0000" autocomplete="off">
            <button class="btn btn-primary" onclick="connectSender()">
                <i class="fa-solid fa-link"></i> ربط الآن
            </button>
            <button class="btn" onclick="switchScreen('screen-home')">إلغاء</button>
            <div class="loader" id="sender-loader"></div>
            <p id="sender-status" style="color: #ff453a; display: none; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="screen-trackpad" class="screen">
        <div style="width: 100%; max-width: 500px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3><i class="fa-solid fa-circle" style="color: #32d74b; font-size: 12px;"></i> متصل بالآيباد</h3>
                <button class="btn" style="width: auto; padding: 5px 15px; margin: 0; border-radius: 8px;" onclick="location.reload()">إنهاء</button>
            </div>
            <div id="trackpad-area">
                <div class="trackpad-hint">
                    <i class="fa-solid fa-hand-pointer" style="font-size: 30px; margin-bottom: 10px;"></i>
                    <br>حرك إصبعك هنا
                </div>
            </div>
        </div>
    </div>

    <script>
        const PREFIX = "wateen-mouse-os-"; // بادئة مخفية لمنع تداخل الأكواد عالمياً
        let peer = null;
        let connection = null;

        // إحداثيات الماوس الوهمي للآيباد
        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;
        const cursorEl = document.getElementById('custom-cursor');

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // ==========================================
        // 1. نظام المستلم (الآيباد)
        // ==========================================
        function initReceiver() {
            switchScreen('screen-receiver');
            const randomCode = Math.floor(1000 + Math.random() * 9000).toString(); // كود من 4 أرقام
            
            peer = new Peer(PREFIX + randomCode);

            peer.on('open', (id) => {
                document.getElementById('display-code').innerText = randomCode;
                document.getElementById('receiver-status').innerText = "بانتظار اتصال الهاتف...";
            });

            peer.on('connection', (conn) => {
                connection = conn;
                document.getElementById('receiver-waiting').style.display = 'none';
                cursorEl.style.display = 'block';
                updateCursorPosition();

                // استقبال حركات الماوس من الهاتف
                conn.on('data', (data) => {
                    if (data.type === 'move') {
                        // حساسية الماوس (مضروبة في 1.5 لسرعة استجابة أعلى)
                        cursorX += data.dx * 1.5;
                        cursorY += data.dy * 1.5;

                        // منع الماوس من الخروج خارج الشاشة
                        cursorX = Math.max(0, Math.min(window.innerWidth, cursorX));
                        cursorY = Math.max(0, Math.min(window.innerHeight, cursorY));

                        updateCursorPosition();
                    } else if (data.type === 'click') {
                        // محاكاة الضغطة في مكان المؤشر
                        simulateClick(cursorX, cursorY);
                    }
                });
            });

            peer.on('error', (err) => {
                document.getElementById('receiver-status').innerText = "حدث خطأ في الشبكة.";
            });
        }

        function updateCursorPosition() {
            cursorEl.style.left = cursorX + 'px';
            cursorEl.style.top = cursorY + 'px';
        }

        function simulateClick(x, y) {
            // إخفاء المؤشر مؤقتاً لمعرفة العنصر الذي تحته
            cursorEl.style.display = 'none';
            let element = document.elementFromPoint(x, y);
            if (element) {
                element.click();
            }
            cursorEl.style.display = 'block';
            
            // تأثير بصري بسيط عند النقر
            cursorEl.style.transform = 'scale(0.8)';
            setTimeout(() => cursorEl.style.transform = 'scale(1)', 100);
        }

        // ==========================================
        // 2. نظام المرسل (الهاتف)
        // ==========================================
        function showSenderLogin() {
            switchScreen('screen-sender-login');
        }

        function connectSender() {
            const code = document.getElementById('input-code').value;
            const statusText = document.getElementById('sender-status');
            
            if(code.length !== 4) {
                statusText.innerText = "يرجى إدخال 4 أرقام";
                statusText.style.display = 'block';
                return;
            }

            document.getElementById('sender-loader').style.display = 'block';
            statusText.style.display = 'none';

            peer = new Peer();
            peer.on('open', () => {
                connection = peer.connect(PREFIX + code, { reliable: true });

                connection.on('open', () => {
                    switchScreen('screen-trackpad');
                    initTrackpad();
                });

                connection.on('error', () => {
                    showError("فشل الاتصال، تأكد من الرمز.");
                });
            });

            peer.on('error', (err) => {
                showError("تعذر العثور على الآيباد.");
            });
        }

        function showError(msg) {
            document.getElementById('sender-loader').style.display = 'none';
            const statusText = document.getElementById('sender-status');
            statusText.innerText = msg;
            statusText.style.display = 'block';
        }

        function initTrackpad() {
            const trackpad = document.getElementById('trackpad-area');
            let lastX = 0;
            let lastY = 0;
            let isMoving = false;

            // عند وضع الإصبع
            trackpad.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                lastX = touch.clientX;
                lastY = touch.clientY;
                isMoving = false;
            }, {passive: false});

            // عند سحب الإصبع (تحريك الماوس)
            trackpad.addEventListener('touchmove', (e) => {
                e.preventDefault(); // منع تمرير الصفحة
                isMoving = true;
                const touch = e.touches[0];
                
                const deltaX = touch.clientX - lastX;
                const deltaY = touch.clientY - lastY;

                if (connection && connection.open) {
                    connection.send({ type: 'move', dx: deltaX, dy: deltaY });
                }

                lastX = touch.clientX;
                lastY = touch.clientY;
            }, {passive: false});

            // عند رفع الإصبع (إذا لم تكن هناك حركة، تُحسب كضغطة)
            trackpad.addEventListener('touchend', (e) => {
                if (!isMoving && connection && connection.open) {
                    connection.send({ type: 'click' });
                }
            });
        }
    </script>
</body>
</html>
