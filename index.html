<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wateen OS - Ultra Fast Mouse</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(25, 25, 25, 0.85);
            --primary-color: #0A84FF;
            --text-main: #ffffff;
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-user-select: none; user-select: none;
        }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden; touch-action: none;
        }

        .screen { display: none; width: 100%; height: 100%; padding: 20px; flex-direction: column; justify-content: center; align-items: center; }
        .screen.active { display: flex; }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
            padding: 30px; width: 100%; max-width: 400px; text-align: center;
        }

        .btn {
            background: rgba(40,40,40,0.8); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 15px; border-radius: 16px; font-size: 16px;
            cursor: pointer; width: 100%; margin-bottom: 12px; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: var(--primary-color); border: none; font-weight: bold; }

        .code-display { font-size: 48px; font-weight: bold; letter-spacing: 8px; color: var(--primary-color); margin: 20px 0; }
        .pin-input {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 15px; border-radius: 16px; font-size: 24px;
            text-align: center; letter-spacing: 10px; margin-bottom: 20px; outline: none;
        }

        /* Trackpad السريع جداً */
        #trackpad-area {
            width: 100%; height: 75vh; background: var(--glass-bg);
            border-radius: 24px; margin-top: 15px; position: relative;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* المؤشر باستخدام Hardware Acceleration */
        #custom-cursor {
            display: none; position: absolute; top: 0; left: 0;
            width: 20px; height: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 512"><path fill="%23ffffff" d="M302.189 329.126H196.105l55.831 135.993c3.889 9.428-.555 19.999-9.444 23.999l-49.165 21.427c-9.165 4-19.443-.571-23.332-9.714l-53.053-129.136-86.664 89.138C22.279 469.715 0 463.153 0 452.873V55.856C0 42.427 15.556 34.714 26.11 43.856l284.444 257.986c10.833 9.714 3.889 27.284-8.365 27.284z"/></svg>');
            background-size: contain; background-repeat: no-repeat;
            pointer-events: none; z-index: 9999;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.6));
            will-change: transform; /* إخبار المعالج بالاستعداد لحركة سريعة */
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <div id="screen-home" class="screen active">
        <div class="glass-panel">
            <h1 style="margin-bottom: 20px;">Wateen OS</h1>
            <button class="btn" onclick="initReceiver()">مستلم (الآيباد)</button>
            <button class="btn btn-primary" onclick="switchScreen('screen-sender-login')">مرسل (الهاتف)</button>
        </div>
    </div>

    <div id="screen-receiver" class="screen">
        <div class="glass-panel" id="receiver-waiting">
            <h2>رمز الاتصال</h2>
            <div class="code-display" id="display-code">----</div>
            <p style="color: #888;">أدخله في هاتفك</p>
        </div>
    </div>

    <div id="screen-sender-login" class="screen">
        <div class="glass-panel">
            <h2>أدخل الرمز</h2>
            <input type="tel" id="input-code" class="pin-input" maxlength="4">
            <button class="btn btn-primary" onclick="connectSender()">اتصال فائق السرعة</button>
            <button class="btn" onclick="switchScreen('screen-home')">رجوع</button>
        </div>
    </div>

    <div id="screen-trackpad" class="screen">
        <div style="width: 100%; max-width: 500px;">
            <div style="display: flex; justify-content: space-between;">
                <span style="color: #32d74b; font-weight: bold;">متصل ⚡</span>
                <button onclick="requestWakeLock()" style="background:none; border:none; color:#0A84FF; font-size:14px;">إبقاء الشاشة مضاءة</button>
            </div>
            <div id="trackpad-area"></div>
        </div>
    </div>

    <script>
        const PREFIX = "wos-ultra-";
        let peer, connection;
        let cursorX = window.innerWidth / 2, cursorY = window.innerHeight / 2;
        const cursorEl = document.getElementById('custom-cursor');
        let wakeLock = null;

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- نظام الآيباد (المستلم) ---
        function initReceiver() {
            switchScreen('screen-receiver');
            const code = Math.floor(1000 + Math.random() * 9000).toString();
            peer = new Peer(PREFIX + code);

            peer.on('open', () => document.getElementById('display-code').innerText = code);

            peer.on('connection', (conn) => {
                document.getElementById('receiver-waiting').style.display = 'none';
                cursorEl.style.display = 'block';
                updateCursorGPU(); // التحديث السريع الأول

                conn.on('data', (data) => {
                    if (data.type === 'm') {
                        // حساسية الحركة 2.0 لاستجابة أسرع
                        cursorX += data.x * 2.0;
                        cursorY += data.y * 2.0;
                        
                        // الحدود
                        cursorX = Math.max(0, Math.min(window.innerWidth, cursorX));
                        cursorY = Math.max(0, Math.min(window.innerHeight, cursorY));
                        
                        // طلب تحديث الشاشة فوراً عبر كرت الشاشة
                        requestAnimationFrame(updateCursorGPU);
                    } else if (data.type === 'c') {
                        simulateClick(cursorX, cursorY);
                    }
                });
            });
        }

        function updateCursorGPU() {
            // استخدام translate3d يضمن استخدام الـ GPU لسرعة فائقة بدون تقطيع
            cursorEl.style.transform = `translate3d(${cursorX}px, ${cursorY}px, 0)`;
        }

        function simulateClick(x, y) {
            cursorEl.style.display = 'none';
            let el = document.elementFromPoint(x, y);
            if (el) el.click();
            cursorEl.style.display = 'block';
            cursorEl.style.transform = `translate3d(${cursorX}px, ${cursorY}px, 0) scale(0.8)`;
            setTimeout(() => updateCursorGPU(), 100);
        }

        // --- نظام الهاتف (المرسل) ---
        function connectSender() {
            const code = document.getElementById('input-code').value;
            peer = new Peer();
            peer.on('open', () => {
                // reliable: false تسرع نقل البيانات (مثل ألعاب الأونلاين)
                connection = peer.connect(PREFIX + code, { reliable: false });
                connection.on('open', () => {
                    switchScreen('screen-trackpad');
                    initTrackpad();
                    requestWakeLock(); // محاولة منع قفل الشاشة تلقائياً
                });
            });
        }

        function initTrackpad() {
            const trackpad = document.getElementById('trackpad-area');
            let lastX = 0, lastY = 0, isMoving = false;

            trackpad.addEventListener('touchstart', (e) => {
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
                isMoving = false;
            }, {passive: false});

            trackpad.addEventListener('touchmove', (e) => {
                e.preventDefault();
                isMoving = true;
                const touch = e.touches[0];
                const dx = touch.clientX - lastX;
                const dy = touch.clientY - lastY;

                // إرسال البيانات المدمجة فوراً
                if (connection && connection.open) {
                    connection.send({ type: 'm', x: dx, y: dy });
                }
                lastX = touch.clientX;
                lastY = touch.clientY;
            }, {passive: false});

            trackpad.addEventListener('touchend', () => {
                if (!isMoving && connection && connection.open) connection.send({ type: 'c' });
            });
        }

        // ميزة إبقاء الشاشة مضاءة للهاتف (Wake Lock API)
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('الشاشة ستبقى مضاءة');
                }
            } catch (err) {
                console.log('ميزة بقاء الشاشة غير مدعومة في هذا المتصفح');
            }
        }
    </script>
</body>
</html>
